app = "community-note-copilot"
primary_region = "iad"

[build]

[env]
  SQLITE_PATH = "/data/community_note_copilot.sqlite3"
  TELEGRAM_LISTEN_HOST = "0.0.0.0"
  TELEGRAM_LISTEN_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[mounts]]
  source = "data"
  destination = "/data"
  processes = ["app"]
